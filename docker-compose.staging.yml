services:
  backend:
    image: ghcr.io/weareuntitled/peters-erp/backend:latest
    container_name: peters-erp-staging-backend
    ports:
      - "8001:8000"
    volumes:
      # Mount data directory for SQLite persistence
      - ../data/staging:/app/data
      # Mount static files (logos, uploads)
      - ../static:/app/static
    environment:
      - DATABASE_URL=sqlite:////app/data/gswin_modern.db
      - API_URL=https://staging.peters-erp.com/api
      - SECRET_KEY=${SECRET_KEY:-staging-secret-key-change-me-12345}
      - LOG_LEVEL=debug
      - CORS_ORIGINS=https://staging.peters-erp.com,http://localhost:5173
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: ghcr.io/weareuntitled/peters-erp/frontend:latest
    container_name: peters-erp-staging-frontend
    ports:
      - "5175:80"
    environment:
      - VITE_API_URL=https://staging.peters-erp.com/api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: peters-erp-staging
