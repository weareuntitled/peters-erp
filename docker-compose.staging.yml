services:
  backend:
    image: ghcr.io/weareuntitled/peters-erp/backend:${BACKEND_TAG:-latest}
    pull_policy: never
    container_name: peters-erp-staging-backend
    ports:
      - "8001:8000"
    volumes:
      - /opt/peters-erp/data/staging:/app/data
      - /opt/peters-erp/static:/app/static
    env_file: /opt/peters-erp/.env.staging
    environment:
      - DATABASE_URL=sqlite:////app/data/gswin_modern.db
      - CORS_ORIGINS=http://187.77.68.83:5175,http://localhost:5173,http://localhost:5174
      - LOG_LEVEL=debug
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: ghcr.io/weareuntitled/peters-erp/frontend:${FRONTEND_TAG:-latest}
    pull_policy: never
    container_name: peters-erp-staging-frontend
    ports:
      - "5175:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: peters-erp-staging
