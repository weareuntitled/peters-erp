name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Git ref to deploy (tag, branch, or SHA)'
        required: true
        default: 'main'
        type: string
      confirm:
        description: 'Type "deploy-to-production" to confirm'
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: github.event.inputs.confirm != 'deploy-to-production'
        run: |
          echo "Confirmation failed. You must type 'deploy-to-production' to proceed."
          exit 1
      
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git_ref }}
      
      - name: Verify ref exists
        run: |
          git log --oneline -1
          echo "Deploying ref: ${{ github.event.inputs.git_ref }}"

  build:
    needs: validate
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build.yml
    with:
      backend_tag: ghcr.io/weareuntitled/peters-erp/backend:production-${{ github.event.inputs.git_ref }}-${{ github.run_number }}
      frontend_tag: ghcr.io/weareuntitled/peters-erp/frontend:production-${{ github.event.inputs.git_ref }}-${{ github.run_number }}

  backup:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Backup Production Database
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            BACKUP_DIR="/opt/peters-erp/data/production/backups"
            mkdir -p "$BACKUP_DIR"
            
            # Backup with timestamp (only if DB exists)
            if [ -f /opt/peters-erp/data/production/gswin_modern.db ]; then
              BACKUP_FILE="gswin_modern.db.backup-$(date +%Y%m%d-%H%M%S).sqlite"
              cp /opt/peters-erp/data/production/gswin_modern.db "$BACKUP_DIR/$BACKUP_FILE"
              echo "Database backed up to: $BACKUP_DIR/$BACKUP_FILE"
            else
              echo "No database found to backup (fresh install)"
            fi
            
            # Keep only last 10 backups
            ls -t "$BACKUP_DIR"/gswin_modern.db.backup-*.sqlite 2>/dev/null | tail -n +11 | xargs rm -f 2>/dev/null || true

  deploy:
    needs: [validate, build, backup]
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git_ref }}

      - name: Deploy to Production VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            set -e
            export TAG="production-${{ github.event.inputs.git_ref }}-${{ github.run_number }}"
            echo "Deploying production with tag: $TAG"
            
            # Login to GHCR for pulling private images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            
            # Pull latest repo first
            cd /opt/peters-erp/repo
            git fetch origin main
            git reset --hard origin/main
            
            # Copy fresh scripts
            cp scripts/*.sh /opt/peters-erp/scripts/
            chmod +x /opt/peters-erp/scripts/*.sh
            
            # Run production deployment
            /opt/peters-erp/scripts/deploy-production.sh "$TAG"
            
            echo "Production deployment complete!"

      - name: Health Check
        if: success()
        continue-on-error: true
        run: |
          echo "Waiting for production to be ready..."
          sleep 15
          curl -f https://peters-erp.com/api/health || echo "Health check warning - service may still be starting"

      - name: Check SMTP configured
        id: smtp_check
        if: always()
        run: |
          if [ -n "${{ secrets.SMTP_HOST }}" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "SMTP not configured, skipping email notification"
          fi

      - name: Send Email Notification
        if: always() && steps.smtp_check.outputs.configured == 'true'
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASSWORD }}
          to: djdanep@gmail.com
          from: GitHub Actions <noreply@peters-erp.com>
          subject: "${{ job.status == 'success' && '🚀' || '❌' }} Production Deployed - Peters ERP"
          body: |
            Production deployment status: ${{ job.status }}
            
            Git Ref: ${{ github.event.inputs.git_ref }}
            Commit: ${{ github.sha }}
            Deployed by: ${{ github.actor }}
            Run number: ${{ github.run_number }}
            
            Access: https://peters-erp.com
