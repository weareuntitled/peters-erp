name: Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  build:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build.yml
    with:
      backend_tag: ghcr.io/weareuntitled/peters-erp/backend:staging-${{ github.sha }}
      frontend_tag: ghcr.io/weareuntitled/peters-erp/frontend:staging-${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Staging VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          envs: GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            set -e
            export TAG="staging-${{ github.sha }}"
            echo "Deploying staging with tag: $TAG"
            
            # Login to GHCR for pulling private images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            
            # Pull latest repo first
            cd /opt/peters-erp/repo
            git fetch origin main
            git reset --hard origin/main
            
            # Copy fresh scripts to /opt/peters-erp/scripts
            cp scripts/*.sh /opt/peters-erp/scripts/
            chmod +x /opt/peters-erp/scripts/*.sh
            
            # Run staging deployment
            /opt/peters-erp/scripts/deploy-staging.sh "$TAG"
            
            echo "Staging deployment complete!"

      - name: Check SMTP configured
        id: smtp_check
        if: always()
        run: |
          if [ -n "${{ secrets.SMTP_HOST }}" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "SMTP not configured, skipping email notification"
          fi

      - name: Send Email Notification
        if: always() && steps.smtp_check.outputs.configured == 'true'
        uses: dawidd6/action-send-mail@v3
        continue-on-error: true
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASSWORD }}
          to: djdanep@gmail.com
          from: GitHub Actions <noreply@peters-erp.com>
          subject: "${{ job.status == 'success' && '✅' || '❌' }} Staging Deployed - Peters ERP"
          body: |
            Staging deployment status: ${{ job.status }}
            
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Message: ${{ github.event.head_commit.message }}
            
            Access: https://staging.peters-erp.com

      - name: Health Check
        if: success()
        continue-on-error: true
        run: |
          echo "Waiting for staging to be ready..."
          sleep 15
          curl -f https://staging.peters-erp.com/api/health || echo "Health check warning - service may still be starting"
