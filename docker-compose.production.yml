services:
  backend:
    image: ghcr.io/weareuntitled/peters-erp/backend:latest
    container_name: peters-erp-prod-backend
    ports:
      - "8000:8000"
    volumes:
      - /opt/peters-erp/data/production:/app/data
      - /opt/peters-erp/static:/app/static
    env_file: /opt/peters-erp/.env.production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: ghcr.io/weareuntitled/peters-erp/frontend:latest
    container_name: peters-erp-prod-frontend
    ports:
      - "5173:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: peters-erp-production
