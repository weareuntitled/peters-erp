services:
  backend:
    image: ghcr.io/weareuntitled/peters-erp/backend:${BACKEND_TAG:-latest}
    container_name: peters-erp-prod-backend
    ports:
      - "8000:8000"
    volumes:
      - /opt/peters-erp/data/production:/app/data
      - /opt/peters-erp/static:/app/static
    env_file: /opt/peters-erp/.env.production
    environment:
      - DATABASE_URL=sqlite:////app/data/gswin_modern.db
      - CORS_ORIGINS=https://peters-erp.com,https://www.peters-erp.com
      - LOG_LEVEL=info
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: ghcr.io/weareuntitled/peters-erp/frontend:${FRONTEND_TAG:-latest}
    container_name: peters-erp-prod-frontend
    ports:
      - "5173:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: peters-erp-production
